<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>but is it threatened?</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f6f8;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a3a4a;
      color: #fff;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: 0.01em; }
    header p  { font-size: 0.8rem; opacity: 0.6; margin-top: 0.1rem; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4caf50; flex-shrink: 0; margin-left: auto;
      transition: background .3s;
    }
    .status-dot.loading { background: #ff9800; animation: pulse 1s infinite; }
    .status-dot.error   { background: #f44336; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    main {
      max-width: 780px;
      margin: 2.5rem auto;
      padding: 0 1.25rem;
      transition: max-width .2s;
    }
    main.wide { max-width: 1100px; }

    /* ── Search ─────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 1rem;
    }
    #search {
      width: 100%;
      padding: 0.85rem 3rem 0.85rem 1.1rem;
      font-size: 1.05rem;
      border: 2px solid #dde1e9;
      border-radius: 10px;
      background: #fff;
      outline: none;
      transition: border-color .15s;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    #search:focus { border-color: #1a3a4a; }
    #clear-btn {
      position: absolute; right: 0.75rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; font-size: 1.1rem; color: #aaa;
      display: none; line-height: 1;
    }
    #clear-btn:hover { color: #555; }

    /* ── Dropdown ───────────────────────────────────────── */
    #suggestions {
      position: absolute;
      top: calc(100% + 4px); left: 0; right: 0;
      background: #fff;
      border: 1.5px solid #dde1e9;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      overflow: hidden;
      z-index: 100;
      max-height: 420px;
      overflow-y: auto;
    }
    #suggestions[hidden] { display: none; }

    .section-sep {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
      padding: 0.45rem 1rem 0.2rem;
      border-top: 1px solid #f0f2f5;
      background: #fafbfc;
    }
    .section-sep:first-child { border-top: none; }

    .suggestion {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 1px solid #f0f2f5;
      transition: background .1s;
    }
    .suggestion:last-child { border-bottom: none; }
    .suggestion:hover, .suggestion.active { background: #f0f4f8; }

    .sname { flex: 1; min-width: 0; font-style: italic; }
    .via-tag {
      font-size: 0.76rem; color: #888; white-space: nowrap;
      font-style: normal;
    }
    .syn-tag {
      font-size: 0.76rem; color: #aaa; white-space: nowrap;
      font-style: normal;
    }
    .syn-tag::before { content: '→ '; }
    .rank-tag {
      font-size: 0.71rem; color: #bbb;
      white-space: nowrap; text-transform: capitalize;
      font-style: normal;
    }

    /* ── NZTCS badges ───────────────────────────────────── */
    .badge {
      font-size: 0.68rem; font-weight: 600;
      padding: 0.18em 0.55em; border-radius: 4px;
      white-space: nowrap; letter-spacing: 0.02em; flex-shrink: 0;
    }
    .cat-threatened               { background:#fde8e8; color:#c0392b; }
    .cat-at-risk                  { background:#fef3e2; color:#c07000; }
    .cat-not-threatened           { background:#e8f5e9; color:#2e7d32; }
    .cat-data-deficient           { background:#f0f0f0; color:#777; }
    .cat-extinct                  { background:#2c2c2c; color:#ddd; }
    .cat-introduced-and-naturalised { background:#ede7f6; color:#6a1b9a; }
    .cat-non-resident-native      { background:#e3f2fd; color:#1565c0; }
    .cat-taxonomically-indistinct { background:#f5f5f5; color:#9e9e9e; }
    .cat-not-assessed             { background:#f5f5f5; color:#9e9e9e; }
    .cat-pest-plant               { background:#fde8e8; color:#b71c1c; border:1px solid #f5bcbc; }

    /* ── Loading / messages ─────────────────────────────── */
    .spinner {
      display:flex; align-items:center; gap:.5rem;
      padding:.8rem 1rem; font-size:.85rem; color:#aaa;
    }
    .spin-icon {
      width:14px; height:14px;
      border:2px solid #ddd; border-top-color:#888;
      border-radius:50%; animation:spin .6s linear infinite; flex-shrink:0;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .msg { padding:.8rem 1rem; font-size:.88rem; color:#888; }

    /* ── Detail panel ───────────────────────────────────── */
    #detail {
      background:#fff; border:1.5px solid #dde1e9;
      border-radius:12px; padding:1.5rem;
      box-shadow:0 2px 12px rgba(0,0,0,.07);
    }
    #detail[hidden] { display:none; }

    .detail-name { font-size:1.35rem; font-weight:600; font-style:italic; margin-bottom:.2rem; }
    .detail-author { font-size:.85rem; color:#666; font-style:normal; margin-bottom:.75rem; }

    .detail-meta {
      display:flex; flex-wrap:wrap; gap:.5rem;
      margin-bottom:1rem; align-items:center;
    }
    .pill {
      font-size:.78rem; padding:.2em .65em; border-radius:20px;
      background:#eef1f5; color:#555; text-transform:capitalize;
    }
    .pill.status-current   { background:#e8f5e9; color:#2e7d32; }
    .pill.status-synonym   { background:#fff3e0; color:#bf6000; }
    .pill.status-misapplied{ background:#fce4ec; color:#c62828; }

    .accepted-row {
      font-size:.88rem; color:#555; margin-bottom:1rem;
      padding:.6rem .9rem;
      background:#fffbf0; border-left:3px solid #f59e0b;
      border-radius:0 6px 6px 0;
    }
    .accepted-row strong { color:#1a1a2e; }

    .dl-title {
      font-size:.72rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.08em; color:#aaa; margin:1rem 0 .5rem;
    }

    .hierarchy {
      display:flex; flex-wrap:wrap; gap:.3rem;
      align-items:center; font-size:.83rem; color:#555;
    }
    .hierarchy .sep { color:#ccc; }

    .nztcs-box {
      margin-top:1.1rem; padding:.9rem 1.1rem;
      border-radius:8px; border:1.5px solid;
    }
    .nztcs-box.cat-threatened              { background:#fdf2f2; border-color:#f5bcbc; color:#c0392b; }
    .nztcs-box.cat-at-risk                 { background:#fffaf2; border-color:#fce8b2; color:#c07000; }
    .nztcs-box.cat-not-threatened          { background:#f2fbf4; border-color:#b2dfbb; color:#2e7d32; }
    .nztcs-box.cat-data-deficient          { background:#f8f8f8; border-color:#ddd; color:#666; }
    .nztcs-box.cat-extinct                 { background:#2c2c2c; border-color:#555; color:#ddd; }
    .nztcs-box.cat-introduced-and-naturalised { background:#f5f0fc; border-color:#d4bff5; color:#6a1b9a; }
    .nztcs-box.cat-non-resident-native     { background:#f0f7ff; border-color:#b3d4f5; color:#1565c0; }
    .nztcs-box.cat-taxonomically-indistinct{ background:#f5f5f5; border-color:#e0e0e0; color:#757575; }
    .nztcs-box.cat-not-assessed            { background:#f5f5f5; border-color:#e0e0e0; color:#757575; }

    .nztcs-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.3rem; }
    .nztcs-label  { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; opacity:.7; }
    .nztcs-year   { font-size:.75rem; opacity:.7; }
    .nztcs-status { font-size:1.05rem; font-weight:700; }
    .nztcs-cat    { font-size:.82rem; opacity:.8; }

    .nzor-link {
      display:inline-block; margin-top:1rem;
      font-size:.8rem; color:#1a3a4a;
      text-decoration:none; border-bottom:1px solid #b0c4d0;
    }
    .nzor-link:hover { border-color:#1a3a4a; }

    .hint {
      text-align:center; color:#bbb;
      font-size:.88rem; margin-top:2.5rem;
    }

    /* ── Tabs ───────────────────────────────────────────── */
    .tabs {
      display:flex; gap:.5rem; margin-bottom:1.25rem;
    }
    .tab-btn {
      padding:.45rem 1.1rem; border-radius:8px; border:1.5px solid #dde1e9;
      background:#fff; font-size:.88rem; cursor:pointer; color:#666;
      transition:background .1s, color .1s, border-color .1s;
    }
    .tab-btn.active { background:#1a3a4a; color:#fff; border-color:#1a3a4a; }

    /* ── Batch ──────────────────────────────────────────── */
    #batch-panel { display:none; }
    #batch-panel.visible { display:block; }

    .drop-zone {
      border:2px dashed #cdd3dc; border-radius:10px;
      padding:2rem 1.5rem; text-align:center;
      background:#fafbfc; cursor:pointer;
      transition:border-color .15s, background .15s;
      margin-bottom:1rem;
    }
    .drop-zone.drag-over { border-color:#1a3a4a; background:#f0f4f8; }
    .drop-zone p { color:#aaa; font-size:.9rem; margin-bottom:.5rem; }
    .drop-zone strong { color:#555; }

    #batch-paste {
      width:100%; min-height:100px; padding:.75rem 1rem;
      font-size:.88rem; border:1.5px solid #dde1e9; border-radius:8px;
      resize:vertical; font-family:inherit; outline:none;
      transition:border-color .15s;
    }
    #batch-paste:focus { border-color:#1a3a4a; }

    .batch-actions {
      display:flex; gap:.75rem; align-items:center; margin-top:.75rem;
    }
    .btn-primary {
      padding:.55rem 1.3rem; background:#1a3a4a; color:#fff;
      border:none; border-radius:8px; cursor:pointer; font-size:.9rem;
      transition:opacity .15s;
    }
    .btn-primary:hover { opacity:.85; }
    .btn-primary:disabled { opacity:.4; cursor:default; }
    .btn-secondary {
      padding:.55rem 1.1rem; background:#fff; color:#555;
      border:1.5px solid #dde1e9; border-radius:8px; cursor:pointer; font-size:.9rem;
    }
    .batch-count { font-size:.83rem; color:#888; }

    /* ── Results table ──────────────────────────────────── */
    #batch-results { margin-top:1.25rem; overflow-x:auto; }
    .results-table {
      width:100%; border-collapse:collapse; font-size:.83rem;
    }
    .results-table th {
      text-align:left; padding:.45rem .75rem;
      background:#1a3a4a; color:#fff; font-weight:600;
      font-size:.72rem; text-transform:uppercase; letter-spacing:.06em;
      white-space:nowrap;
    }
    .results-table td {
      padding:.45rem .75rem; border-bottom:1px solid #f0f2f5;
      vertical-align:middle;
    }
    .results-table tr:last-child td { border-bottom:none; }
    .results-table tr:hover td { background:#f8f9fb; }
    .results-table .unmatched td { color:#bbb; font-style:italic; }
    .results-table em { font-style:italic; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>but is it threatened? <span style="font-size:0.65rem;font-weight:400;opacity:0.4;letter-spacing:0.05em;">v1.23</span></h1>
    <p>NZOR names · NZTCS conservation status</p>
  </div>
  <div id="dot" class="status-dot loading" title="Loading NZTCS data…"></div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" id="tab-search" onclick="switchTab('search')">Search</button>
    <button class="tab-btn" id="tab-batch" onclick="switchTab('batch')">Batch lookup</button>
  </div>

  <div id="search-panel">
    <div class="search-wrap">
      <input id="search" type="text"
        placeholder="Search by name — scientific, common, or Māori…"
        autocomplete="off" spellcheck="false" aria-label="Search species">
      <button id="clear-btn" title="Clear" aria-label="Clear">✕</button>
      <div id="suggestions" hidden role="listbox"></div>
    </div>
    <div id="detail" hidden></div>
    <p class="hint" id="hint">Search across all NZ organism names in NZOR, with conservation status from NZTCS.</p>
  </div>

  <div id="batch-panel">
    <div class="drop-zone" id="drop-zone">
      <p><strong>Drag &amp; drop a CSV or text file here</strong></p>
      <p>One name per row — any column, any name type (scientific, common, Māori, synonym)</p>
    </div>
    <textarea id="batch-paste" placeholder="Or paste names here, one per line…"></textarea>
    <div class="batch-actions">
      <button class="btn-primary" id="batch-run" onclick="runBatch()">Match names</button>
      <button class="btn-secondary" id="batch-dl" onclick="downloadBatchCSV()" disabled>Download CSV</button>
      <span class="batch-count" id="batch-count"></span>
    </div>
    <div id="batch-results"></div>
  </div>
</main>

<script>
const NZOR = 'https://data.nzor.org.nz/v1';

let nztcs          = null;   // nztcs_slim.json: lowercase-name → {s,c,y,...}
let nztcsStripped  = null;   // author-stripped keys: "genus species subsp" → entry
let nztcsSpecies   = null;   // species-level fallback: "genus species" → most threatened entry
let nppa           = null;   // nppa.json: Set of lowercase scientific names
let nzorIndex      = [];     // sorted search index built from nzor_names.json
let activeIdx = -1;
let allItems  = [];
let debounce;

// ── Normalisation ────────────────────────────────────────────────────────────
function norm(s) {
  return s ? s.toLowerCase().replace(/\s+/g, ' ').trim() : '';
}
function normDia(s) {
  return norm(s).normalize('NFD').replace(/[̀-ͯ]/g, '');
}
function capFirst(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
}
function catClass(cat) {
  return cat ? 'cat-' + cat.toLowerCase().replace(/[^a-z]+/g, '-').replace(/-$/,'') : '';
}
function badgeHtml(entry) {
  if (!entry) return '';
  return `<span class="badge ${catClass(entry.c)}">${escHtml(entry.s || entry.c)}</span>`;
}
function nztcsFor(...names) {
  if (!nztcs) return null;
  for (const n of names) {
    if (!n) continue;
    const k = norm(n);
    if (nztcs[k]) return nztcs[k];
    if (nztcsStripped?.[k]) return { ...nztcsStripped[k], _uncertain: true };
    if (nztcsSpecies?.[k]) return nztcsSpecies[k];
    // For subspecies-level names (3+ words), also try genus+species fallback
    const parts = k.split(' ');
    if (parts.length >= 3) {
      const sp = parts[0] + ' ' + parts[1];
      if (nztcsStripped?.[sp]) return { ...nztcsStripped[sp], _uncertain: true };
      if (nztcsSpecies?.[sp]) return nztcsSpecies[sp];
    }
  }
  return null;
}
function isPestPlant(...names) {
  if (!nppa) return false;
  for (const n of names) { if (n && nppa.has(norm(n))) return true; }
  return false;
}
function commonNamesFor(sciName) {
  if (!sciName) return { cn: '', mn: '' };
  const entry = nztcs?.[norm(sciName)];
  let cn = entry?.cn || '';
  let mn = entry?.mn || '';
  // NZOR fallback: find first vernacular entry linked to this sci name
  if (!cn) {
    const ns = norm(sciName);
    for (const item of nzorIndex) {
      if (item.cls === 'v' && norm(item.sci || '') === ns) {
        cn = item.n || capFirst(item.key);
        break;
      }
    }
  }
  return { cn, mn };
}

// ── Load data ────────────────────────────────────────────────────────────────
const dot = document.getElementById('dot');
const weekStamp = Math.floor(Date.now() / 6048e5);

Promise.all([
  fetch(`nztcs_slim.json?v=${weekStamp}`).then(r => r.json()),
  fetch(`nzor_names.json?v=${weekStamp}`).then(r => r.json()),
  fetch(`nppa.json?v=${weekStamp}`).then(r => r.json()),
]).then(([nztcsData, nzorData, nppaData]) => {
  nztcs = nztcsData;
  nppa  = new Set(nppaData);
  // Build species-level fallback: "genus species" → most threatened subspecies entry
  const threatRank = s => {
    const t = (s || '').toLowerCase();
    if (t.includes('nationally critical'))   return 9;
    if (t.includes('nationally endangered')) return 8;
    if (t.includes('nationally vulnerable')) return 7;
    if (t.includes('declining'))             return 6;
    if (t.includes('recovering'))            return 5;
    if (t.includes('relict'))                return 4;
    if (t.includes('naturally uncommon'))    return 3;
    if (t.includes('not threatened'))        return 2;
    if (t.includes('extinct'))               return 1;
    return 0;
  };
  nztcsSpecies = {};
  for (const [key, val] of Object.entries(nztcsData)) {
    const parts = key.split(' ');
    if (parts.length >= 3) {
      const sp = parts[0] + ' ' + parts[1];
      if (!nztcsSpecies[sp] || threatRank(val.s) > threatRank(nztcsSpecies[sp].s)) {
        nztcsSpecies[sp] = { ...val, _subspecies: true };
      }
    }
  }
  // Build author-stripped map: "genus species subsp" (no author) → entry
  nztcsStripped = {};
  for (const [key, val] of Object.entries(nztcsData)) {
    const stripped = key.replace(/\s*\([^)]+\)\s*$/, '').trim();
    if (stripped !== key && !nztcsStripped[stripped]) {
      nztcsStripped[stripped] = val;
    }
  }
  buildIndex(nzorData);
  dot.className = 'status-dot';
  dot.title = `NZOR: ${nzorIndex.length.toLocaleString()} names · NZTCS: ${Object.keys(nztcsData).length.toLocaleString()} entries · NPPA: ${nppa.size} pest plants`;
}).catch(() => {
  dot.className = 'status-dot error';
  dot.title = 'Data failed to load';
});

function buildIndex(d) {
  for (const [key, val] of Object.entries(d)) {
    nzorIndex.push({ key, kd: normDia(key), ...val });
  }
  // Add NZTCS common + Māori names that aren't already in the NZOR index
  if (nztcs) {
    const existing = new Set(nzorIndex.map(x => x.key));
    for (const [nztcsKey, val] of Object.entries(nztcs)) {
      const sciName = val.n || capFirst(nztcsKey);
      for (const cn of [val.cn, val.mn]) {
        if (!cn) continue;
        const key = norm(cn);
        if (!key || existing.has(key)) continue;
        existing.add(key);
        nzorIndex.push({ key, kd: normDia(key), n: cn, cls: 'v', sci: sciName });
      }
    }
  }
  nzorIndex.sort((a, b) => a.key < b.key ? -1 : 1);
}

// ── Search ───────────────────────────────────────────────────────────────────
function nzorSearch(q) {
  if (!nzorIndex.length || q.length < 2) return [];
  const qd = normDia(q);
  const prefix = [], contains = [];
  for (const item of nzorIndex) {
    if (item.kd.startsWith(qd)) {
      prefix.push(item);
    } else if (contains.length < 10 && item.kd.includes(qd)) {
      contains.push(item);
    }
  }
  return [...prefix, ...contains];
}

// ── UI ───────────────────────────────────────────────────────────────────────
const input    = document.getElementById('search');
const sugBox   = document.getElementById('suggestions');
const clearBtn = document.getElementById('clear-btn');
const detail   = document.getElementById('detail');
const hint     = document.getElementById('hint');

input.addEventListener('input', () => {
  clearBtn.style.display = input.value ? 'block' : 'none';
  clearTimeout(debounce);
  const q = input.value.trim();
  if (!q) { hideSug(); return; }
  debounce = setTimeout(() => renderDropdown(nzorSearch(q)), 80);
});
input.addEventListener('keydown', onKey);
clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.style.display = 'none';
  hideSug();
  detail.hidden = true;
  hint.hidden = false;
  input.focus();
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) hideSug();
});

// ── Render dropdown ───────────────────────────────────────────────────────────
function renderDropdown(results) {
  if (!results.length) {
    sugBox.innerHTML = `<div class="msg">No results found</div>`;
    sugBox.hidden = false;
    allItems = [];
    return;
  }
  allItems = [];
  let html = `<div class="section-sep">Names</div>`;

  for (const item of results) {
    const isVernac = item.cls === 'v';
    const isSyn    = !!item.acc;
    const isPref   = !isVernac && !isSyn;

    // NZTCS badge: for vernacular use linked sci name, for synonym use accepted name
    const entry   = nztcsFor(item.sci, item.acc, item.key);
    const isPest  = isPestPlant(item.sci, item.acc, item.key);

    // Name display
    const dispName = item.n || capFirst(item.key);
    const nameHtml = isVernac
      ? escHtml(dispName)
      : isPref
        ? `<strong><em>${escHtml(dispName)}</em></strong>`
        : `<em>${escHtml(dispName)}</em>`;

    // Secondary tag: linked sci name (vernacular) or accepted name (synonym)
    const secName  = isVernac ? item.sci : item.acc;
    const secHtml  = secName ? `<span class="syn-tag">${escHtml(secName)}</span>` : '';
    const typeTag  = isVernac ? `<span class="rank-tag">vernacular</span>` : '';
    // Common name for scientific entries
    const sciKey   = isPref ? item.key : (isSyn ? norm(item.acc || '') : '');
    const cnames   = isPref ? commonNamesFor(item.n || capFirst(item.key)) : { cn: '', mn: '' };
    const cnTag    = cnames.cn ? `<span class="via-tag">${escHtml(cnames.cn)}</span>` : '';

    html += `<div class="suggestion" data-i="${allItems.length}" role="option">
      <span class="sname">${nameHtml}</span>
      ${secHtml}${cnTag}${typeTag}
      ${isPest ? `<span class="badge cat-pest-plant">Pest plant</span>` : ''}
      ${badgeHtml(entry)}
    </div>`;
    allItems.push(item);
  }

  sugBox.innerHTML = html;
  sugBox.querySelectorAll('.suggestion').forEach(el => {
    el.addEventListener('click', () => pick(+el.dataset.i));
  });
  sugBox.hidden = false;
  activeIdx = -1;
}

function hideSug() {
  sugBox.hidden = true;
  activeIdx = -1;
  allItems = [];
}

// ── Keyboard nav ──────────────────────────────────────────────────────────────
function onKey(e) {
  const items = sugBox.querySelectorAll('.suggestion');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault(); setActive(Math.min(activeIdx + 1, items.length - 1), items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault(); setActive(Math.max(activeIdx - 1, 0), items);
  } else if (e.key === 'Enter' && activeIdx >= 0) {
    e.preventDefault(); pick(activeIdx);
  } else if (e.key === 'Escape') { hideSug(); }
}
function setActive(i, items) {
  items.forEach(el => el.classList.remove('active'));
  activeIdx = i;
  items[i].classList.add('active');
  items[i].scrollIntoView({ block: 'nearest' });
}

// ── Select ────────────────────────────────────────────────────────────────────
async function pick(i) {
  const item = allItems[i];
  if (!item) return;
  hideSug();
  hint.hidden = true;
  detail.innerHTML = `<div class="spinner"><div class="spin-icon"></div>Loading…</div>`;
  detail.hidden = false;

  const fetchId = async (id) => {
    const r = await fetch(`${NZOR}/names/${id}`, { headers: { Accept: 'application/json' } });
    const d = await r.json();
    return d.names?.[0] ?? null;
  };

  try {
    if (item.cls === 'v' && item.sciId) {
      // Vernacular — show the linked scientific name's detail
      const sciName = await fetchId(item.sciId);
      if (sciName) { showDetail(sciName, item.n || capFirst(item.key)); return; }
    }
    if (item.id) {
      const nameObj = await fetchId(item.id);
      if (nameObj) { showDetail(nameObj); return; }
    }
  } catch {}

  // Fallback: offline detail from local data
  showLocalDetail(item);
}

// ── Detail — NZOR result ──────────────────────────────────────────────────────
function showDetail(n, vernacularName) {
  const isSyn  = n.acceptedName?.nameId && n.nameId !== n.acceptedName.nameId;
  const entry  = nztcsFor(n.partialName, n.acceptedName?.partialName);
  const isPest = isPestPlant(n.partialName, n.acceptedName?.partialName);

  const s = (n.status || '').toLowerCase();
  const statusCls = s.includes('current') ? 'status-current'
    : s.includes('synonym') ? 'status-synonym'
    : s.includes('misapplied') ? 'status-misapplied' : '';

  const nzBio  = (n.biostatuses || []).find(b => [].concat(b.geoRegion ?? []).includes('New Zealand'));
  const origin = nzBio ? ([].concat(nzBio.origin ?? [])[0] ?? null) : null;
  const originCls = origin === 'Endemic' ? 'status-current'
    : origin === 'Native' ? 'status-current'
    : origin === 'Exotic' ? 'status-synonym' : '';

  const hier = (n.classificationHierarchy || [])
    .filter(h => h.rank !== 'none' && h.partialName !== 'ROOT')
    .map(h => `<span>${escHtml(h.partialName)}<span style="opacity:.45;font-size:.72em;margin-left:.2em">${h.rank}</span></span>`)
    .join('<span class="sep"> › </span>');

  const sciForNames  = isSyn ? (n.acceptedName?.partialName || n.partialName) : n.partialName;
  const { cn, mn }   = commonNamesFor(sciForNames);

  const acceptedBlock = isSyn ? `
    <div class="accepted-row">Synonym of <strong>${escHtml(n.acceptedName?.partialName || '')}</strong></div>` : '';

  const vernacRow = vernacularName
    ? `<div class="accepted-row" style="border-color:#6ab0d4">Also known as <strong>${escHtml(vernacularName)}</strong></div>` : '';

  detail.innerHTML = `
    <div class="detail-name">${n.formattedPartialName || escHtml(n.partialName)}</div>
    ${n.authors ? `<div class="detail-author">${escHtml(n.authors)}</div>` : ''}
    ${cn || mn ? `<div class="detail-author">${[cn, mn].filter(Boolean).map(escHtml).join(' · ')}</div>` : ''}
    ${origin ? `<div class="detail-meta"><span class="pill ${originCls}">${escHtml(origin)}</span></div>` : ''}
    ${acceptedBlock}
    ${vernacRow}
    ${isPest ? `<div class="nztcs-box cat-pest-plant" style="margin-top:.75rem"><div class="nztcs-header"><span class="nztcs-label">NPPA</span></div><div class="nztcs-status">Pest plant</div><div class="nztcs-cat">National Pest Plant Accord — banned from sale, propagation &amp; distribution</div></div>` : ''}
    ${nztcsBlock(entry)}
    <a class="nzor-link" href="https://www.nzor.org.nz/names/${n.nameId}" target="_blank" rel="noopener">
      View on NZOR ↗
    </a>`;
  detail.hidden = false;
}

// ── Detail — offline fallback from nzor_names.json ────────────────────────────
function showLocalDetail(item) {
  const isVernac = item.cls === 'v';
  const isSyn    = !!item.acc;
  const dispName = item.n || capFirst(item.key);
  const entry    = nztcsFor(item.sci, item.acc, item.key);
  const isPest   = isPestPlant(item.sci, item.acc, item.key);
  const { cn, mn } = commonNamesFor(item.sci || item.acc || (item.n || capFirst(item.key)));

  const secBlock = isVernac && item.sci
    ? `<div class="accepted-row" style="border-color:#6ab0d4">Vernacular name for <strong>${escHtml(item.sci)}</strong></div>`
    : isSyn
      ? `<div class="accepted-row">Synonym of <strong>${escHtml(item.acc)}</strong></div>`
      : '';

  detail.innerHTML = `
    <div class="detail-name" style="${isVernac ? 'font-style:normal' : ''}">${isVernac ? escHtml(dispName) : `<em>${escHtml(dispName)}</em>`}</div>
    ${cn || mn ? `<div class="detail-author">${[cn, mn].filter(Boolean).map(escHtml).join(' · ')}</div>` : ''}
    <div class="detail-meta">
      ${isVernac ? '<span class="pill">Vernacular name</span>' : ''}
      ${isSyn ? '<span class="pill status-synonym">Synonym</span>' : ''}
    </div>
    ${secBlock}
    ${isPest ? `<div class="nztcs-box cat-pest-plant" style="margin-top:.75rem"><div class="nztcs-header"><span class="nztcs-label">NPPA</span></div><div class="nztcs-status">Pest plant</div><div class="nztcs-cat">National Pest Plant Accord — banned from sale, propagation &amp; distribution</div></div>` : ''}
    ${nztcsBlock(entry)}
    ${item.id ? `<a class="nzor-link" href="https://www.nzor.org.nz/names/${item.id}" target="_blank" rel="noopener">View on NZOR ↗</a>` : ''}`;
  detail.hidden = false;
}

// ── NZTCS detail block ────────────────────────────────────────────────────────
function nztcsBlock(entry) {
  if (!entry || !entry.s) {
    return `<div class="dl-title">NZ Threat Classification</div>
            <div style="font-size:.85rem;color:#aaa;padding:.4rem 0">Not listed in NZTCS</div>`;
  }
  const cls = catClass(entry.c);
  const subNote = entry._subspecies
    ? `<div style="font-size:.75rem;opacity:.7;margin-top:.3rem">Most threatened subspecies: <em>${escHtml(entry.n || '')}</em></div>` : '';
  const uncertainNote = entry._uncertain
    ? `<div style="font-size:.75rem;opacity:.7;margin-top:.3rem">* might be wrong</div>` : '';
  return `<div class="dl-title">NZ Threat Classification</div>
    <div class="nztcs-box ${cls}">
      <div class="nztcs-header">
        <span class="nztcs-label">NZTCS</span>
        ${entry.y ? `<span class="nztcs-year">${entry.y}</span>` : ''}
      </div>
      <div class="nztcs-status">${escHtml(entry.s)}${entry._uncertain ? ' *' : ''}</div>
      <div class="nztcs-cat">${escHtml(entry.c || '')}</div>
      ${subNote}
      ${uncertainNote}
    </div>`;
}

// ── Util ──────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('search-panel').style.display = tab === 'search' ? '' : 'none';
  document.getElementById('batch-panel').classList.toggle('visible', tab === 'batch');
  document.getElementById('tab-search').classList.toggle('active', tab === 'search');
  document.getElementById('tab-batch').classList.toggle('active', tab === 'batch');
  document.querySelector('main').classList.toggle('wide', tab === 'batch');
}

// ── Drag & drop ───────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const batchPaste = document.getElementById('batch-paste');

dropZone.addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.csv,.txt,.tsv';
  inp.onchange = e => loadFile(e.target.files[0]);
  inp.click();
});
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => { batchPaste.value = e.target.result; };
  reader.readAsText(file);
}

// ── Batch match ───────────────────────────────────────────────────────────────
let batchResults = [];

function batchMatch(rawName) {
  const key = norm(rawName);
  if (!key) return null;
  const kd = normDia(key);

  // Binary search for exact key match
  let lo = 0, hi = nzorIndex.length - 1, item = null;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (nzorIndex[mid].key === key)      { item = nzorIndex[mid]; break; }
    else if (nzorIndex[mid].key < key)   lo = mid + 1;
    else                                  hi = mid - 1;
  }
  // Fallback: diacritic-normalised exact match
  if (!item) item = nzorIndex.find(x => x.kd === kd) ?? null;

  if (!item) return { input: rawName, matched: false };

  // Resolve to canonical scientific name
  const sciName = item.cls === 'v' ? item.sci
    : item.acc ? item.acc
    : (item.n || capFirst(item.key));

  const nztcsEntry = nztcsFor(sciName, item.key);
  const pest       = isPestPlant(sciName, item.key);

  // Common + Māori: prefer NZTCS entry for the canonical sci name
  const sciEntry = sciName ? nztcs?.[norm(sciName)] : null;
  const common   = sciEntry?.cn || nztcsEntry?.cn || '';
  const maori    = sciEntry?.mn || nztcsEntry?.mn || '';

  const exoticFromNztcs = (nztcsEntry?.c || '').toLowerCase().includes('introduced');
  const origin = pest || exoticFromNztcs ? 'Exotic' : 'Unknown';

  return {
    input:    rawName,
    matched:  true,
    sci:      sciName || '',
    common,
    maori,
    status:   nztcsEntry?.s || '',
    category: nztcsEntry?.c || '',
    year:     nztcsEntry?.y || '',
    pest:     pest ? 'Yes' : '',
    origin,
  };
}

function runBatch() {
  const raw = batchPaste.value.trim();
  if (!raw) return;

  // Parse: CSV (take first non-empty cell per row) or plain text (one name per line)
  const lines = raw.split(/\r?\n/).filter(l => l.trim());
  const names = lines.map(l => {
    // Try CSV split — take first non-empty cell
    const cells = l.split(',').map(c => c.replace(/^"|"$/g, '').trim());
    return cells.find(c => c) || '';
  }).filter(Boolean);

  batchResults = names.map(batchMatch).filter(Boolean);

  renderBatchTable(batchResults);
  const matched = batchResults.filter(r => r.matched).length;
  document.getElementById('batch-count').textContent =
    `${matched} of ${batchResults.length} matched`;
  document.getElementById('batch-dl').disabled = matched === 0;
}

function renderBatchTable(results) {
  if (!results.length) { document.getElementById('batch-results').innerHTML = ''; return; }
  const rows = results.map(r => {
    if (!r.matched) {
      return `<tr class="unmatched"><td>${escHtml(r.input)}</td><td colspan="6">No match found</td></tr>`;
    }
    const pestCell = r.pest ? `<span class="badge cat-pest-plant">Pest plant</span>` : '';
    const statusCell = r.status
      ? `<span class="badge ${catClass(r.category)}">${escHtml(r.status)}</span>`
      : '<span style="color:#bbb">—</span>';
    return `<tr>
      <td>${escHtml(r.input)}</td>
      <td><em>${escHtml(r.sci)}</em></td>
      <td>${escHtml(r.common)}</td>
      <td>${escHtml(r.maori)}</td>
      <td>${statusCell} ${pestCell}</td>
      <td>${escHtml(r.category)}</td>
      <td>${escHtml(r.year)}</td>
      <td>${escHtml(r.origin)}</td>
    </tr>`;
  }).join('');

  document.getElementById('batch-results').innerHTML = `
    <table class="results-table">
      <thead><tr>
        <th>Input name</th><th>Scientific name</th><th>Common name</th>
        <th>Māori name</th><th>Status</th><th>Category</th><th>Year</th><th>Origin</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Download CSV ──────────────────────────────────────────────────────────────
function downloadBatchCSV() {
  const header = ['Input name','Scientific name','Common name','Māori name','NZTCS status','NZTCS category','Year','Pest plant (NPPA)','Origin'];
  const csvRows = [header, ...batchResults.map(r => r.matched
    ? [r.input, r.sci, r.common, r.maori, r.status, r.category, r.year, r.pest, r.origin]
    : [r.input, 'No match', '', '', '', '', '', '', '']
  )].map(row => row.map(c => `"${String(c ?? '').replace(/"/g,'""')}"`).join(','));
  const blob = new Blob(['﻿' + csvRows.join('\r\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nz-species-status.csv';
  a.click();
}
</script>
